ai_usage_summary: |
  Used Claude/OpenCode (Sisyphus) for implementation and code review. No candidate
  data was fed to any LLM. The scoring engine, embeddings generation, and ranking
  pipeline are original work built using the plan provided.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid multi-signal ranker: 6-component base score + behavioral multiplier.
  C1 (30%): career-narrative cosine similarity via all-MiniLM-L6-v2 embeddings.
  C2 (20%): production AI experience — rule-based title+career+description match,
  with hard penalty for consulting-only careers.
  C3 (15%): experience seniority, 5-9 yr sweet spot.
  C4 (15%): skill depth with endorsement × duration trust multiplier.
  C5 (10%): location/logistics (Pune/Noida preferred).
  C6 (10%): education tier + GitHub activity.
  Multiplied by behavioral score [0.40, 1.10] from 23 Redrob platform signals.
  Anti-trap measures: 7-check honeypot detection (impossible duration, expert-skill
  abuse, skill duration overflow, future dates, salary inversion, empty profiles,
  overlapping roles), LangChain-tourist penalty, career plausibility guard that
  caps C4 when C2 < 0.25 (catches keyword stuffers like "Marketing Manager with 9
  Pinecone skills"). Runtime: ~30s for 100K on CPU.

